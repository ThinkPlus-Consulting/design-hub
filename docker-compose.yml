services:
  neo4j:
    image: neo4j:5-community
    container_name: design-hub-neo4j
    ports:
      - "${DESIGN_HUB_NEO4J_HTTP_PORT:-27484}:7474"
      - "${DESIGN_HUB_NEO4J_BOLT_PORT:-27697}:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 256M
      NEO4J_server_memory_heap_max__size: 256M
      NEO4J_server_memory_pagecache_size: 128M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  neo4j_data:
  neo4j_logs:
