name: Verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/password
        options: >-
          --health-cmd="cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: ./mvnw -B test

  frontend:
    name: Frontend Verification
    runs-on: ubuntu-latest
    needs: backend
    services:
      neo4j:
        image: neo4j:5-community
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/password
        options: >-
          --health-cmd="cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Set up Node 25.8.1
        uses: actions/setup-node@v4
        with:
          node-version: '25.8.1'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          cd backend
          ./mvnw -B spring-boot:run > /tmp/design-hub-backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8091/actuator/health > /tmp/design-hub-health.json; then
              cat /tmp/design-hub-health.json
              exit 0
            fi
            sleep 2
          done
          cat /tmp/design-hub-backend.log
          exit 1

      - name: Run benchmark integrity gate
        run: node ./scripts/check-benchmark.mjs
        env:
          BENCHMARK_OUTPUT_PATH: /tmp/design-hub-benchmark.json

      - name: Run frontend verification
        working-directory: frontend
        run: npm run verify:ui

      - name: Upload benchmark snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-snapshot
          path: /tmp/design-hub-benchmark.json
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/design-hub-backend.log
