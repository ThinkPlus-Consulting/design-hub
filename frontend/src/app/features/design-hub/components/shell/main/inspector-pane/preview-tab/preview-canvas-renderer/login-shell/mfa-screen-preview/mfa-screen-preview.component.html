<div
  class="mfa-shell"
  data-dom-ref="mfa-overlay"
  [attr.source-object-id]="sourceObjectId('screen')" [attr.guid]="guid('screen')"
  data-inspect-id="mfa-overlay"
  [class.ssg-focused]="isFocused('screen')"
  [style.--ssg-screen-background-color]="backgroundColorStyle()"
  [style.--ssg-screen-background-pattern-opacity]="backgroundPatternOpacity()"
>
  <div class="mfa-screen-root">
    <div class="overlay-background-container">
      <div class="overlay-background">
        <div class="overlay-background-color-layer"></div>
        @if (showPattern()) {
          <div class="overlay-background-pattern-layer"></div>
        }
      </div>
    </div>
    <form class="mfa-modal mfa-form mfa-modal-surface" data-dom-ref="mfa-modal" [attr.source-object-id]="sourceObjectId('modal')" [attr.guid]="guid('modal')" data-inspect-id="mfa-modal" [class.ssg-focused]="isFocused('modal')">
        <section class="mfa-modal-header" data-dom-ref="mfa-modal-header" [attr.source-object-id]="sourceObjectId('header')" [attr.guid]="guid('header')" data-inspect-id="mfa-modal-header" [class.ssg-focused]="isFocused('header')">
          <h2 data-dom-ref="mfa-title" [attr.source-object-id]="sourceObjectId('title')" [attr.guid]="guid('title')" data-inspect-id="mfa-title" [class.ssg-focused]="isFocused('title')">{{ title() }}</h2>
          <p data-dom-ref="mfa-description" [attr.source-object-id]="sourceObjectId('description')" [attr.guid]="guid('description')" data-inspect-id="mfa-description" [class.ssg-focused]="isFocused('description')">{{ description() }}</p>
        </section>
        <section class="status-message-container" data-dom-ref="mfa-status-message-container" [attr.source-object-id]="sourceObjectId('status')" [attr.guid]="guid('status')" data-inspect-id="mfa-status-message-container" [class.ssg-focused]="isFocused('status')">
          <div class="auth-banner" data-dom-ref="mfa-banner" [attr.source-object-id]="sourceObjectId('banner')" [attr.guid]="guid('banner')" data-inspect-id="mfa-banner" [class.ssg-focused]="isFocused('banner')">{{ banner() }}</div>
        </section>
        <section class="otp-grid" data-dom-ref="mfa-code-container" [attr.source-object-id]="sourceObjectId('otp')" [attr.guid]="guid('otp')" data-inspect-id="mfa-code-container" [class.ssg-focused]="isFocused('otp')">
          <p-inputotp
            [ngModel]="otpValue()"
            (ngModelChange)="onOtpValueChange($event)"
            name="verificationCode"
            [length]="6"
            [attr.data-dom-ref]="'mfa-input-otp'"
            [attr.source-object-id]="sourceObjectId('otpInput')"
            [attr.guid]="guid('otpInput')"
            [attr.data-inspect-id]="'mfa-input-otp'"
            [class.ssg-focused]="isFocused('otpInput')"
            [ariaLabel]="otpAriaLabel()"
          >
            <ng-template #input let-token let-events="events" let-index="index">
              <input
                type="text"
                [maxLength]="1"
                (input)="events.input($event)"
                (keydown)="events.keydown($event)"
                [attr.value]="token"
                class="custom-otp-input"
              />
              @if (index === 3) {
                <div class="otp-divider">
                  <i class="pi pi-minus"></i>
                </div>
              }
            </ng-template>
          </p-inputotp>
        </section>
        <section class="mfa-action-bar" data-dom-ref="mfa-action-bar" [attr.source-object-id]="sourceObjectId('actions')" [attr.guid]="guid('actions')" data-inspect-id="mfa-action-bar" [class.ssg-focused]="isFocused('actions')">
          <div data-dom-ref="mfa-back-action" [attr.source-object-id]="sourceObjectId('backAction')" [attr.guid]="guid('backAction')" data-inspect-id="mfa-back-action" [class.ssg-focused]="isFocused('backAction')">
            <p-button [label]="backLabel()" severity="secondary" [outlined]="true" styleClass="auth-btn secondary" />
          </div>
          <div data-dom-ref="mfa-verify-action" [attr.source-object-id]="sourceObjectId('verifyAction')" [attr.guid]="guid('verifyAction')" data-inspect-id="mfa-verify-action" [class.ssg-focused]="isFocused('verifyAction')">
            <p-button [label]="verifyLabel()" styleClass="auth-btn" />
          </div>
        </section>
    </form>
  </div>
</div>
