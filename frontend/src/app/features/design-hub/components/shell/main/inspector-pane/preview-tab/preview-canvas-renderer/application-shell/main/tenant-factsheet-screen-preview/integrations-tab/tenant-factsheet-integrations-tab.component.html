<div class="tab-section-layout">
  <div class="tab-section-toolbar">
    <div class="search-bar">
      <span class="search-icon pi pi-search"></span>
      <input
        pInputText
        type="text"
        class="search-input"
        [ariaLabel]="section()?.searchAriaLabel ?? ''"
        [placeholder]="section()?.searchPlaceholder ?? ''"
        [value]="searchValue()"
        (input)="onSearchInput($any($event.target).value)"
        data-testid="input-search-integrations"
      />
    </div>
    <p-button
      icon="pi pi-filter"
      severity="secondary"
      [outlined]="true"
      [rounded]="true"
      [ariaLabel]="section()?.filterToggleAriaLabel ?? ''"
      (onClick)="onToggleFilters()"
      [styleClass]="filtersVisible() ? 'factsheet-icon-action filter-icon-active' : 'factsheet-icon-action'"
    />
    <span class="toolbar-spacer"></span>
    <p-toggleButton
      [ngModel]="viewMode() === 'table'"
      (ngModelChange)="onViewModeChange($event)"
      [onLabel]="section()?.viewMode?.tableLabel ?? ''"
      [offLabel]="section()?.viewMode?.gridLabel ?? ''"
      onIcon="pi pi-list"
      offIcon="pi pi-objects-column"
      [ariaLabel]="section()?.viewToggleAriaLabel ?? ''"
      data-testid="integrations-view-toggle"
    />
  </div>

  <div class="cards-grid" data-testid="integrations-grid">
    @for (integ of items(); track integ.id) {
      <div class="integration-card" [attr.data-testid]="'integration-' + integ.id">
        <div class="integration-header">
          <i [class]="integ.icon" class="integration-icon"></i>
          <span class="integration-name">{{ integ.name }}</span>
        </div>
        <div class="integration-meta">
          <p-tag [value]="integ.protocol" severity="info" />
          <p-tag
            [value]="integ.enabled ? (section()?.enabledLabel ?? '') : (section()?.disabledLabel ?? '')"
            [severity]="integ.enabled ? 'success' : 'danger'"
          />
        </div>
      </div>
    }
  </div>

  <p-paginator [rows]="10" [totalRecords]="items().length" [rowsPerPageOptions]="[10, 20, 50]" data-testid="integrations-paginator" />
</div>
