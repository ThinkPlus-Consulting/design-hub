<div
  class="login-shell"
  data-dom-ref="login-shell"
  [attr.source-object-id]="sourceObjectId('screen')" [attr.guid]="guid('screen')"
  data-inspect-id="login-shell"
  [class.ssg-focused]="isFocused('screen')"
  [style.--ssg-screen-background-color]="backgroundColorStyle()"
  [style.--ssg-screen-background-pattern-opacity]="backgroundPatternOpacity()"
>
  <div class="shell-background-container">
    <div class="shell-background shell-background-color"></div>
    @if (showPattern()) {
      <div class="shell-background shell-background-pattern"></div>
    }
  </div>
  <div class="login-shell-inner">
    <div class="welcome-container" data-dom-ref="welcome-container" [attr.source-object-id]="sourceObjectId('welcome')" [attr.guid]="guid('welcome')" data-inspect-id="welcome-container" [class.ssg-focused]="isFocused('welcome')">
      <div class="welcome-copy">
        <p-message
          class="welcome-title-message"
          severity="secondary"
          variant="simple"
          data-dom-ref="welcome-title"
          [attr.source-object-id]="sourceObjectId('welcomeTitle')"
          [attr.guid]="guid('welcomeTitle')"
          data-inspect-id="welcome-title"
          [class.ssg-focused]="isFocused('welcomeTitle')"
        >
          {{ welcomeTitle() }}
        </p-message>
        <p-message
          class="welcome-subtitle-message"
          severity="secondary"
          variant="simple"
          data-dom-ref="welcome-subtitle"
          [attr.source-object-id]="sourceObjectId('welcomeSubtitle')"
          [attr.guid]="guid('welcomeSubtitle')"
          data-inspect-id="welcome-subtitle"
          [class.ssg-focused]="isFocused('welcomeSubtitle')"
        >
          {{ welcomeSubtitle() }}
        </p-message>
      </div>
    </div>

    <div class="logo-container" data-dom-ref="logo-container" [attr.source-object-id]="sourceObjectId('logo')" [attr.guid]="guid('logo')" data-inspect-id="logo-container" [class.ssg-focused]="isFocused('logo')">
      <img
        class="svg-logo-renderer"
        data-dom-ref="svg-logo-renderer"
        [attr.source-object-id]="sourceObjectId('logoImage')"
        [attr.guid]="guid('logoImage')"
        data-inspect-id="svg-logo-renderer"
        [class.ssg-focused]="isFocused('logoImage')"
        [src]="logoSrc()"
        [alt]="logoAlt()"
      />
    </div>

    <div class="auth-region auth-region-panel sign-in-surface-active" data-dom-ref="auth-region" [attr.source-object-id]="sourceObjectId('authRegion')" [attr.guid]="guid('authRegion')" data-inspect-id="auth-region" [class.ssg-focused]="isFocused('authRegion')">
        <section class="auth-step-container step-active" data-dom-ref="tenant-selection-step-container" [attr.source-object-id]="sourceObjectId('tenantStep')" [attr.guid]="guid('tenantStep')" data-inspect-id="tenant-selection-step-container" [class.ssg-focused]="isFocused('tenantStep')">
          <section class="step-header-container" data-dom-ref="tenant-selection-header-container" [attr.source-object-id]="sourceObjectId('tenantHeader')" [attr.guid]="guid('tenantHeader')" data-inspect-id="tenant-selection-header-container" [class.ssg-focused]="isFocused('tenantHeader')">
            <div class="step-indicator" data-dom-ref="tenant-selection-step-indicator" [attr.source-object-id]="sourceObjectId('tenantIndicator')" [attr.guid]="guid('tenantIndicator')" data-inspect-id="tenant-selection-step-indicator" [class.ssg-focused]="isFocused('tenantIndicator')">{{ tenantStepIndicator() }}</div>
            <h2 class="step-title" data-dom-ref="tenant-selection-step-title" [attr.source-object-id]="sourceObjectId('tenantTitle')" [attr.guid]="guid('tenantTitle')" data-inspect-id="tenant-selection-step-title" [class.ssg-focused]="isFocused('tenantTitle')">{{ tenantStepTitle() }}</h2>
          </section>
          <section class="step-content-container auth-top" data-dom-ref="tenant-selection-content-container" [attr.source-object-id]="sourceObjectId('tenantContent')" [attr.guid]="guid('tenantContent')" data-inspect-id="tenant-selection-content-container" [class.ssg-focused]="isFocused('tenantContent')">
            <div class="tenant-registry-dropdown" data-dom-ref="tenant-registry-dropdown" [attr.source-object-id]="sourceObjectId('tenantDropdown')" [attr.guid]="guid('tenantDropdown')" data-inspect-id="tenant-registry-dropdown" [class.ssg-focused]="isFocused('tenantDropdown')">
              <button
                type="button"
                class="tenant-dropdown-trigger"
              >
                <span class="tenant-chip-list" data-inspect-id="tenant-registry-chips">{{ tenantSelectionLabel() }}</span>
                <span class="tenant-dropdown-caret" data-inspect-id="tenant-registry-dropdown-caret" aria-hidden="true">▾</span>
              </button>
              <div class="tenant-dropdown-panel hidden" data-inspect-id="tenant-registry-dropdown-panel">
                <div class="tenant-dropdown-filter-row" data-inspect-id="tenant-registry-dropdown-filter-row">
                  <input
                    class="tenant-dropdown-filter"
                    [attr.aria-label]="tenantSearchAriaLabel()"
                    type="search"
                    [placeholder]="tenantSearchPlaceholder()"
                    autocomplete="off"
                    data-inspect-id="tenant-registry-dropdown-filter"
                  >
                </div>
                <div class="tenant-dropdown-options" data-inspect-id="tenant-registry-dropdown-options-list"></div>
              </div>
            </div>
            <label class="remember-selection-control" data-dom-ref="remember-selection-checkbox" [attr.source-object-id]="sourceObjectId('tenantRemember')" [attr.guid]="guid('tenantRemember')" data-inspect-id="remember-selection-checkbox" [class.ssg-focused]="isFocused('tenantRemember')">
              <input type="checkbox">
              <span data-inspect-id="remember-selection-label">{{ rememberTenantSelectionLabel() }}</span>
            </label>
          </section>
        </section>

        <section class="auth-step-container step-disabled" data-dom-ref="authentication-method-step-container" [attr.source-object-id]="sourceObjectId('authMethodStep')" [attr.guid]="guid('authMethodStep')" data-inspect-id="authentication-method-step-container" [class.ssg-focused]="isFocused('authMethodStep')">
          <section class="step-header-container" data-dom-ref="authentication-method-header-container" [attr.source-object-id]="sourceObjectId('authMethodHeader')" [attr.guid]="guid('authMethodHeader')" data-inspect-id="authentication-method-header-container" [class.ssg-focused]="isFocused('authMethodHeader')">
            <div class="step-indicator" data-dom-ref="authentication-method-step-indicator" [attr.source-object-id]="sourceObjectId('authMethodIndicator')" [attr.guid]="guid('authMethodIndicator')" data-inspect-id="authentication-method-step-indicator" [class.ssg-focused]="isFocused('authMethodIndicator')">{{ authMethodStepIndicator() }}</div>
            <h2 class="step-title" data-dom-ref="authentication-method-step-title" [attr.source-object-id]="sourceObjectId('authMethodTitle')" [attr.guid]="guid('authMethodTitle')" data-inspect-id="authentication-method-step-title" [class.ssg-focused]="isFocused('authMethodTitle')">{{ authMethodStepTitle() }}</h2>
          </section>

          <section class="status-message-container" data-dom-ref="status-message-container" [attr.source-object-id]="sourceObjectId('authStatusContainer')" [attr.guid]="guid('authStatusContainer')" data-inspect-id="status-message-container" [class.ssg-focused]="isFocused('authStatusContainer')">
            <div class="auth-banner" data-dom-ref="auth-banner" [attr.source-object-id]="sourceObjectId('authBanner')" [attr.guid]="guid('authBanner')" data-inspect-id="auth-banner" [class.ssg-focused]="isFocused('authBanner')">
              {{ authBanner() }}
            </div>
          </section>

          <div class="step-content-container provider-selection-container" data-dom-ref="provider-selection-container" [attr.source-object-id]="sourceObjectId('providerSelection')" [attr.guid]="guid('providerSelection')" data-inspect-id="providers-view" [class.ssg-focused]="isFocused('providerSelection')">
            <section class="step-content-container no-auth-container state-panel" data-dom-ref="no-auth-container" [attr.source-object-id]="sourceObjectId('noAuthContainer')" [attr.guid]="guid('noAuthContainer')" data-inspect-id="no-auth-container" [class.ssg-focused]="isFocused('noAuthContainer')">
              <h4 data-dom-ref="no-auth-title" [attr.source-object-id]="sourceObjectId('noAuthTitle')" [attr.guid]="guid('noAuthTitle')" data-inspect-id="no-auth-title" [class.ssg-focused]="isFocused('noAuthTitle')">{{ noAuthTitle() }}</h4>
              <p data-dom-ref="no-auth-text" [attr.source-object-id]="sourceObjectId('noAuthText')" [attr.guid]="guid('noAuthText')" data-inspect-id="no-auth-text" [class.ssg-focused]="isFocused('noAuthText')">{{ noAuthText() }}</p>
            </section>

            <article class="provider-option-panel provider-option-surface auth-provider-container" data-dom-ref="auth-provider-container" [attr.source-object-id]="sourceObjectId('providerCard')" [attr.guid]="guid('providerCard')" [class.ssg-focused]="isFocused('providerCard')">
                  <section class="provider-button-header provider-header-container provider-header-surface" data-dom-ref="provider-header-container" [attr.source-object-id]="sourceObjectId('providerHeader')" [attr.guid]="guid('providerHeader')" [class.ssg-focused]="isFocused('providerHeader')">
                      <div class="provider-ident">
                        <span class="provider-logo" data-dom-ref="auth-provider-logo" [attr.source-object-id]="sourceObjectId('providerLogo')" [attr.guid]="guid('providerLogo')" data-inspect-id="auth-provider-logo" [class.ssg-focused]="isFocused('providerLogo')">{{ providerLogoText() }}</span>
                        <strong class="provider-title" data-dom-ref="auth-method-name" [attr.source-object-id]="sourceObjectId('providerName')" [attr.guid]="guid('providerName')" data-inspect-id="auth-method-name" [class.ssg-focused]="isFocused('providerName')">{{ providerName() }}</strong>
                      </div>
                      <label class="provider-remember" data-dom-ref="remember-me-selection" [attr.source-object-id]="sourceObjectId('providerRemember')" [attr.guid]="guid('providerRemember')" data-inspect-id="remember-me-selection" [class.ssg-focused]="isFocused('providerRemember')">
                        <input type="radio" name="remember-provider">
                        <span>{{ rememberMeLabel() }}</span>
                      </label>
                      <button type="button" class="expand-action provider-expand-toggle" data-dom-ref="expand-action" [attr.source-object-id]="sourceObjectId('providerExpand')" [attr.guid]="guid('providerExpand')" data-inspect-id="expand-action" [class.ssg-focused]="isFocused('providerExpand')">{{ expandActionLabel() }}</button>
                  </section>

                  <div class="step-content-container interaction-body-container" data-inspect-id="interaction-body-container">
                    <form class="provider-variant-container provider-variant-form" data-dom-ref="provider-variant-container" [attr.source-object-id]="sourceObjectId('providerVariant')" [attr.guid]="guid('providerVariant')" [class.ssg-focused]="isFocused('providerVariant')">
                      <section class="neo-field field-container" data-dom-ref="user-name-field-container" [attr.source-object-id]="sourceObjectId('usernameField')" [attr.guid]="guid('usernameField')" [class.ssg-focused]="isFocused('usernameField')">
                        <label for="login-username-input" class="neo-field-label" data-dom-ref="identifier-label" [attr.source-object-id]="sourceObjectId('usernameLabel')" [attr.guid]="guid('usernameLabel')" data-inspect-id="identifier-label" [class.ssg-focused]="isFocused('usernameLabel')">{{ usernameLabel() }}</label>
                        <div class="neo-input-wrap" data-dom-ref="identifier-input" [attr.source-object-id]="sourceObjectId('usernameInput')" [attr.guid]="guid('usernameInput')" data-inspect-id="identifier-input" [class.ssg-focused]="isFocused('usernameInput')">
                          <input
                            id="login-username-input"
                            class="neo-input"
                            type="text"
                            [value]="usernameValue()"
                            [placeholder]="usernamePlaceholder()"
                            autocomplete="username"
                          >
                          <span class="neo-icon" aria-hidden="true">
                            <svg viewBox="0 0 512 512">
                              <path d="M256 0c-74.439 0-135 60.561-135 135s60.561 135 135 135 135-60.561 135-135S330.439 0 256 0zM423.966 358.195C387.006 320.667 338.009 300 286 300h-60c-52.008 0-101.006 20.667-137.966 58.195C51.255 395.539 31 444.833 31 497c0 8.284 6.716 15 15 15h420c8.284 0 15-6.716 15-15 0-52.167-20.255-101.461-57.034-138.805z"/>
                            </svg>
                          </span>
                        </div>
                      </section>
                      <section class="neo-field field-container password-field-container" data-dom-ref="password-field-container" [attr.source-object-id]="sourceObjectId('passwordField')" [attr.guid]="guid('passwordField')" [class.ssg-focused]="isFocused('passwordField')">
                        <label for="login-password-input" class="neo-field-label" data-dom-ref="password-label" [attr.source-object-id]="sourceObjectId('passwordLabel')" [attr.guid]="guid('passwordLabel')" data-inspect-id="password-label" [class.ssg-focused]="isFocused('passwordLabel')">{{ passwordLabel() }}</label>
                        <input
                          id="login-password-input"
                          class="neo-input neo-input-password"
                          type="password"
                          [value]="passwordValue()"
                          [placeholder]="passwordPlaceholder()"
                          autocomplete="current-password"
                          data-dom-ref="password-input"
                          [attr.source-object-id]="sourceObjectId('passwordInput')" [attr.guid]="guid('passwordInput')"
                          data-inspect-id="password-input"
                          [class.ssg-focused]="isFocused('passwordInput')"
                        >
                        <span class="neo-icon" aria-hidden="true">
                          <svg viewBox="0 0 384 512">
                            <path d="M336 192h-16v-64C320 57.406 262.594 0 192 0S64 57.406 64 128v64H48c-26.453 0-48 21.523-48 48v224c0 26.477 21.547 48 48 48h288c26.453 0 48-21.523 48-48V240c0-26.477-21.547-48-48-48zm-229.332-64c0-47.063 38.27-85.332 85.332-85.332s85.332 38.27 85.332 85.332v64H106.668z"/>
                          </svg>
                        </span>
                        <button
                          type="button"
                          class="password-toggle"
                          [attr.aria-label]="passwordToggleAriaLabel()"
                          [title]="passwordToggleTitle()"
                          data-dom-ref="password-toggle"
                          [attr.source-object-id]="sourceObjectId('passwordToggle')" [attr.guid]="guid('passwordToggle')"
                          data-inspect-id="password-toggle"
                          [class.ssg-focused]="isFocused('passwordToggle')"
                        >
                          <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                          </svg>
                        </button>
                      </section>
                      <section
                        class="sign-in-action-container"
                        data-dom-ref="sign-in-action-container"
                        [attr.source-object-id]="sourceObjectId('signInBar')" [attr.guid]="guid('signInBar')"
                        data-inspect-id="sign-in-action-container"
                        [class.ssg-focused]="isFocused('signInBar')"
                      >
                        <button
                          type="submit"
                          class="auth-btn provider-inline-submit"
                          data-dom-ref="sign-in-action"
                          [attr.source-object-id]="sourceObjectId('signInAction')" [attr.guid]="guid('signInAction')"
                          data-inspect-id="sign-in-action"
                          [class.ssg-focused]="isFocused('signInAction')"
                        >
                          {{ signInLabel() }}
                        </button>
                      </section>
                    </form>
                  </div>
              </article>
          </div>
        </section>
    </div>
  </div>
</div>
