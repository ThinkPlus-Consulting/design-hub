<div
  class="mfa-shell"
  data-dom-ref="mfa-overlay"
  [attr.source-object-id]="sourceObjectId('SHL01.SCN02')" [attr.guid]="guid('SHL01.SCN02')"
  data-inspect-id="mfa-overlay"
  [class.ssg-focused]="isFocused('SHL01.SCN02')"
  [style.--ssg-screen-background-color]="backgroundColorStyle()"
  [style.--ssg-screen-background-pattern-opacity]="backgroundPatternOpacity()"
>
  <div class="mfa-screen-root">
    <div class="overlay-background-container">
      <div class="overlay-background">
        <div class="overlay-background-color-layer"></div>
        @if (showPattern()) {
          <div class="overlay-background-pattern-layer"></div>
        }
      </div>
    </div>
    <form class="mfa-modal mfa-form mfa-modal-surface" data-dom-ref="mfa-modal" [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02')" [attr.guid]="guid('SHL01.SCN02.SEC02')" data-inspect-id="mfa-modal" [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02')">
        <div class="mfa-modal-header" data-dom-ref="mfa-modal-header" [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02.SEC01')" [attr.guid]="guid('SHL01.SCN02.SEC02.SEC01')" data-inspect-id="mfa-modal-header" [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02.SEC01')">
          <h2 data-dom-ref="mfa-title" [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02.SEC01.ELT01')" [attr.guid]="guid('SHL01.SCN02.SEC02.SEC01.ELT01')" data-inspect-id="mfa-title" [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02.SEC01.ELT01')">Verification required</h2>
          <p data-dom-ref="mfa-description" [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02.SEC01.ELT02')" [attr.guid]="guid('SHL01.SCN02.SEC02.SEC01.ELT02')" data-inspect-id="mfa-description" [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02.SEC01.ELT02')">Enter the 6-digit verification code or recovery code.</p>
        </div>
        <div class="status-message-container" data-dom-ref="mfa-status-message-container" [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02.SEC02')" [attr.guid]="guid('SHL01.SCN02.SEC02.SEC02')" data-inspect-id="mfa-status-message-container" [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02.SEC02')">
          <div class="auth-banner" data-dom-ref="mfa-banner" [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02.SEC02.ELT01')" [attr.guid]="guid('SHL01.SCN02.SEC02.SEC02.ELT01')" data-inspect-id="mfa-banner" [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02.SEC02.ELT01')">Status message area for MFA validation and verification feedback.</div>
        </div>
        <div class="otp-grid" data-dom-ref="mfa-code-container" [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02.SEC03')" [attr.guid]="guid('SHL01.SCN02.SEC02.SEC03')" data-inspect-id="mfa-code-container" [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02.SEC03')">
          <p-inputotp
            [(ngModel)]="otpValue"
            name="verificationCode"
            [length]="6"
            [attr.data-dom-ref]="'mfa-input-otp'"
            [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02.SEC03.ELT01')"
            [attr.guid]="guid('SHL01.SCN02.SEC02.SEC03.ELT01')"
            [attr.data-inspect-id]="'mfa-input-otp'"
            [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02.SEC03.ELT01')"
            ariaLabel="Verification code input"
          >
            <ng-template #input let-token let-events="events" let-index="index">
              <input
                type="text"
                [maxLength]="1"
                (input)="events.input($event)"
                (keydown)="events.keydown($event)"
                [attr.value]="token"
                class="custom-otp-input"
              />
              @if (index === 3) {
                <div class="otp-divider">
                  <i class="pi pi-minus"></i>
                </div>
              }
            </ng-template>
          </p-inputotp>
        </div>
        <div class="mfa-action-bar" data-dom-ref="mfa-action-bar" [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02.SEC04')" [attr.guid]="guid('SHL01.SCN02.SEC02.SEC04')" data-inspect-id="mfa-action-bar" [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02.SEC04')">
          <div data-dom-ref="mfa-back-action" [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02.SEC04.ELT01')" [attr.guid]="guid('SHL01.SCN02.SEC02.SEC04.ELT01')" data-inspect-id="mfa-back-action" [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02.SEC04.ELT01')">
            <p-button label="Back" severity="secondary" [outlined]="true" styleClass="auth-btn secondary" />
          </div>
          <div data-dom-ref="mfa-verify-action" [attr.source-object-id]="sourceObjectId('SHL01.SCN02.SEC02.SEC04.ELT02')" [attr.guid]="guid('SHL01.SCN02.SEC02.SEC04.ELT02')" data-inspect-id="mfa-verify-action" [class.ssg-focused]="isFocused('SHL01.SCN02.SEC02.SEC04.ELT02')">
            <p-button label="Verify" styleClass="auth-btn" />
          </div>
        </div>
    </form>
  </div>
</div>
