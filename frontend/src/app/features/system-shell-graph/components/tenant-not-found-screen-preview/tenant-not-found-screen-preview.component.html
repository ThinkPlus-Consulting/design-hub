<div
  class="not-found-shell login-shell"
  data-dom-ref="not-found-shell"
  [attr.source-object-id]="sourceObjectId('SHL01.SCN03')" [attr.guid]="guid('SHL01.SCN03')"
  data-inspect-id="not-found-shell"
  [class.ssg-focused]="isFocused('SHL01.SCN03')"
  [style.--ssg-screen-background-color]="backgroundColorStyle()"
  [style.--ssg-screen-background-pattern-opacity]="backgroundPatternOpacity()"
>
  <div class="shell-background-container">
    <div class="shell-background shell-background-color"></div>
    @if (showPattern()) {
      <div class="shell-background shell-background-pattern"></div>
    }
  </div>
  <div class="login-shell-inner not-found-layout">
    <section class="welcome-container welcome-panel" data-dom-ref="not-found-shell-header-container" [attr.source-object-id]="sourceObjectId('SHL01.SCN03.SEC01')" [attr.guid]="guid('SHL01.SCN03.SEC01')" data-inspect-id="not-found-shell-header-container" [class.ssg-focused]="isFocused('SHL01.SCN03.SEC01')">
      <h1 data-dom-ref="not-found-shell-title" [attr.source-object-id]="sourceObjectId('SHL01.SCN03.SEC01.ELT01')" [attr.guid]="guid('SHL01.SCN03.SEC01.ELT01')" data-inspect-id="not-found-shell-title" [class.ssg-focused]="isFocused('SHL01.SCN03.SEC01.ELT01')">Welcome to EMSIST</h1>
      <h2 data-dom-ref="not-found-shell-subtitle" [attr.source-object-id]="sourceObjectId('SHL01.SCN03.SEC01.ELT02')" [attr.guid]="guid('SHL01.SCN03.SEC01.ELT02')" data-inspect-id="not-found-shell-subtitle" [class.ssg-focused]="isFocused('SHL01.SCN03.SEC01.ELT02')">Empower. Transform. Succeed.</h2>
    </section>
    <div class="logo-container logo-panel" data-dom-ref="not-found-logo-container" [attr.source-object-id]="sourceObjectId('SHL01.SCN03.SEC02')" [attr.guid]="guid('SHL01.SCN03.SEC02')" data-inspect-id="not-found-logo-container" [class.ssg-focused]="isFocused('SHL01.SCN03.SEC02')">
      <div class="svg-logo-renderer" data-dom-ref="not-found-svg-logo-renderer" [attr.source-object-id]="sourceObjectId('SHL01.SCN03.SEC02.ELT01')" [attr.guid]="guid('SHL01.SCN03.SEC02.ELT01')" data-inspect-id="not-found-svg-logo-renderer" [class.ssg-focused]="isFocused('SHL01.SCN03.SEC02.ELT01')">think+</div>
    </div>
    <section class="not-found-region" data-dom-ref="not-found-view" [attr.source-object-id]="sourceObjectId('SHL01.SCN03.SEC03')" [attr.guid]="guid('SHL01.SCN03.SEC03')" data-inspect-id="not-found-view" [class.ssg-focused]="isFocused('SHL01.SCN03.SEC03')">
      <h2 data-dom-ref="not-found-title" [attr.source-object-id]="sourceObjectId('SHL01.SCN03.SEC03.ELT01')" [attr.guid]="guid('SHL01.SCN03.SEC03.ELT01')" data-inspect-id="not-found-title" [class.ssg-focused]="isFocused('SHL01.SCN03.SEC03.ELT01')">Tenant not found</h2>
      <p data-dom-ref="not-found-text" [attr.source-object-id]="sourceObjectId('SHL01.SCN03.SEC03.ELT02')" [attr.guid]="guid('SHL01.SCN03.SEC03.ELT02')" data-inspect-id="not-found-text" [class.ssg-focused]="isFocused('SHL01.SCN03.SEC03.ELT02')">Tenant deleted or does not exist. No authentication controls remain on this state.</p>
      <button type="button" class="auth-btn secondary" data-dom-ref="not-found-action" [attr.source-object-id]="sourceObjectId('SHL01.SCN03.SEC03.ELT03')" [attr.guid]="guid('SHL01.SCN03.SEC03.ELT03')" data-inspect-id="not-found-action" [class.ssg-focused]="isFocused('SHL01.SCN03.SEC03.ELT03')">Back to Login</button>
    </section>
  </div>
</div>
