server:
  port: 8091

spring:
  application:
    name: system-shell-graph-service
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:27697}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:password}
  data:
    neo4j:
      database: ${NEO4J_DATABASE:neo4j}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.emsist: DEBUG

systemshellgraph:
  seed-data: true
